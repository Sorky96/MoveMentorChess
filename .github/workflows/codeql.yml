name: CodeQL

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  schedule:
    - cron: "23 3 * * 1"
  workflow_dispatch:

permissions:
  security-events: write
  packages: read
  actions: read
  contents: read

jobs:
  analyze:
    name: Analyze C#
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # pin v7.0.0

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # pin v5.3.0
        with:
          dotnet-version: "8.0.x"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7c1e4cf0b20d7c1872b26569c00ba908797a59bf # pin v4
        with:
          languages: csharp
          queries: security-and-quality
          build-mode: manual

      - name: Restore dependencies
        run: dotnet restore MoveMentorChess.sln --verbosity minimal

      - name: Build solution
        run: dotnet build MoveMentorChess.sln --configuration Release --no-restore -m:1 --verbosity minimal

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7c1e4cf0b20d7c1872b26569c00ba908797a59bf # pin v4
