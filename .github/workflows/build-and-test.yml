name: Build and test

on:
  push:
    branches:
      - master
      - main
      - "feature/**"
      - "bugfix/**"
      - "architecture/**"
      - "codex/**"
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"

jobs:
  build-and-test:
    name: Build and test
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore MoveMentorChess.sln --verbosity minimal

      - name: Build solution
        run: dotnet build MoveMentorChess.sln --configuration Release --no-restore -m:1 --verbosity minimal

      - name: Run tests
        run: dotnet test MoveMentorChess.sln --configuration Release --no-build -m:1 --verbosity minimal --collect:"XPlat Code Coverage" --results-directory ./TestResults

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Generate Coverage Report
        run: reportgenerator -reports:"TestResults/**/coverage.cobertura.xml" -targetdir:"TestResults/CoverageReport" -reporttypes:"MarkdownSummary;Html"

      - name: Publish Coverage Summary
        shell: pwsh
        run: |
          if (Test-Path "TestResults/CoverageReport/Summary.md") {
            Get-Content "TestResults/CoverageReport/Summary.md" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          } else {
            Write-Error "Coverage summary file not found!"
          }

      - name: Upload Coverage Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-report
          path: TestResults/CoverageReport/
